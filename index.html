<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="author" content="Ikke Musikk Eichstaedt">
  <meta name="description" content="Fisherman: Lofoten — A Norwegian Adventure. Catch legendary fish, explore the Lofoten Islands, and win the Grand Fishing Tournament.">
  <title>Fisherman: Lofoten</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    html {
      /* Lock the root so iOS keyboard can never push content up */
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      /* fixed + 100% prevents iOS from scrolling/resizing when keyboard opens */
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    canvas { display: block; image-rendering: pixelated; touch-action: none; }

    /* Desktop: game fills the full viewport */
    #game-container {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Controls panel — hidden on desktop, shown by mobile-controls.js */
    #controls-panel {
      display: none;
      width: 100%;
      position: relative;
      background: #0d1117;
      border-top: 2px solid #1e3a5f;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="controls-panel"></div>

  <!-- Mobile: prevent scroll drift and accidental zoom -->
  <script>
    // Snap back if anything ever shifts the scroll position
    window.addEventListener('scroll', function() { window.scrollTo(0, 0); }, { passive: true });
    // Block touchmove on non-input elements so the page can't be dragged/scrolled
    document.addEventListener('touchmove', function(e) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/save.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/CharacterSelectScene.js"></script>
  <script src="js/scenes/UIScene.js"></script>
  <script src="js/scenes/FishingScene.js"></script>
  <script src="js/scenes/LeknesScene.js"></script>
  <script src="js/scenes/ReineScene.js"></script>
  <script src="js/scenes/KakernScene.js"></script>
  <script src="js/scenes/KvalvikaScene.js"></script>
  <script src="js/scenes/HenningsvaarScene.js?v=2"></script>
  <script src="js/scenes/TournamentScene.js"></script>
  <script src="js/scenes/TromsoScene.js"></script>
  <script src="js/encounter.js"></script>
  <script src="js/scenes/FlagQuizScene.js"></script>
  <script src="js/scenes/SkilpaddeScene.js"></script>
  <script src="js/scenes/BirdWatchingScene.js"></script>
  <script src="js/scenes/SnowballFightScene.js"></script>
  <script src="js/drag-catch.js"></script>
  <script src="js/mobile-controls.js"></script>
  <script src="js/player-card.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
